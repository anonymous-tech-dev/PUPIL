hydra:
  run:
    dir: .
  sweep:
    dir: .
    subdir: .
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: null
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - context_budget_frames=56,120
    - uniform_context_frames=0,32
  job:
    name: main
    chdir: null
    override_dirname: context_budget_frames=56,120,uniform_context_frames=0,32
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /workspace/Pupil/frame_sampling_experiments/temporal_cot_gdm
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/Pupil/frame_sampling_experiments/temporal_cot_gdm
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
model: Qwen2.5-VL-7B
dataset: lvbench_v2
num_samples: 5
tcot_variant: dynamic_segment
num_segments: 12
frames_per_segment: 64
context_budget_frames: 1000
uniform_context_frames: 0
hier_neighbourhood: 10
hier_max_iters: 3
video_fps: 1
selection_max_tokens: 512
answer_max_tokens: 512
answer_temperature: 0.0
qwen_model_id: Qwen/Qwen2.5-VL-7B-Instruct
qwen_device: cuda
attn_impl: flash_attention_2
gpt_deployment: gpt-4o_2024-11-20
gpt_api_version: '2024-10-21'
gpt_endpoint: https://<AZURE_OPENAI_ENDPOINT>
results_dir: results
egoschema_questions: /home/Pupil/frame_sampling_experiments/datasets/egoschema/subset_questions.json
egoschema_answers: /home/Pupil/frame_sampling_experiments/datasets/egoschema/subset_answers.json
egoschema_video_dir: /home/Pupil/frame_sampling_experiments/datasets/egoschema/videos/videos
lvbench_v1_meta: /home/Pupil/frame_sampling_experiments/datasets/LVBench/video_info.meta.jsonl
lvbench_v1_video_dir: /home/Pupil/frame_sampling_experiments/datasets/LVBench/videos
lvbench_v2_meta: /workspace/Pupil/frame_sampling_experiments/temporal_cot_gdm/video_meta.jsonl
lvbench_v2_video_dir: /data/Pupil/lvbench_v2
